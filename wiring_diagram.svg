<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" width="960" height="680" font-family="monospace">

  <!-- Background -->
  <rect width="960" height="680" fill="#12121e" rx="16"/>
  <text x="480" y="38" text-anchor="middle" fill="#e0e0ff" font-size="21" font-weight="bold">🐾  Dog Video Game — Wiring Diagram  🐾</text>
  <text x="480" y="58" text-anchor="middle" fill="#6666aa" font-size="11">Raspberry Pi 3B+  ·  4× Big Buttons  ·  Tevo Tarantula Board (Y axis)  ·  Treat Dispenser</text>

  <!-- ═══════════════════════════
       RASPBERRY PI BOARD
  ════════════════════════════ -->
  <rect x="355" y="75" width="200" height="420" rx="12" fill="#1a4d1a" stroke="#33cc33" stroke-width="2"/>
  <text x="455" y="97"  text-anchor="middle" fill="#aaffaa" font-size="13" font-weight="bold">Raspberry Pi 3B+</text>
  <text x="455" y="113" text-anchor="middle" fill="#77aa77" font-size="10">40-pin GPIO Header</text>

  <!-- Pin labels — left col (odd pins) x=398, right col (even) x=438 -->
  <!-- Only showing the rows we care about + surrounding context -->

  <!-- Row labels helper: each row is 18px tall starting y=125 -->
  <!-- pin1/2 -->
  <text x="393" y="133" text-anchor="end" fill="#555577" font-size="9">3V3  1</text>
  <text x="468" y="133" fill="#555577" font-size="9">2  5V</text>
  <!-- pin3/4 -->
  <text x="393" y="151" text-anchor="end" fill="#555577" font-size="9">SDA  3</text>
  <text x="468" y="151" fill="#555577" font-size="9">4  5V</text>
  <!-- pin5/6  — GND highlighted -->
  <text x="393" y="169" text-anchor="end" fill="#555577" font-size="9">SCL  5</text>
  <text x="468" y="169" fill="#ff5555" font-size="9" font-weight="bold">6  GND ●</text>
  <!-- pin7/8 -->
  <text x="393" y="187" text-anchor="end" fill="#555577" font-size="9">GP4  7</text>
  <text x="468" y="187" fill="#555577" font-size="9">8  TX</text>
  <!-- pin9/10 -->
  <text x="393" y="205" text-anchor="end" fill="#555577" font-size="9">GND  9</text>
  <text x="468" y="205" fill="#555577" font-size="9">10  RX</text>
  <!-- pin11/12 — GPIO17 UP highlighted -->
  <text x="393" y="223" text-anchor="end" fill="#44aaff" font-size="9" font-weight="bold">GP17 11 ●</text>
  <text x="468" y="223" fill="#555577" font-size="9">12  GP18</text>
  <!-- pin13/14 — GPIO27 DOWN highlighted -->
  <text x="393" y="241" text-anchor="end" fill="#ffaa00" font-size="9" font-weight="bold">GP27 13 ●</text>
  <text x="468" y="241" fill="#555577" font-size="9">14  GND</text>
  <!-- pin15/16 — GPIO22 LEFT / GPIO23 RIGHT highlighted -->
  <text x="393" y="259" text-anchor="end" fill="#00dd88" font-size="9" font-weight="bold">GP22 15 ●</text>
  <text x="468" y="259" fill="#cc44ff" font-size="9" font-weight="bold">16 GP23 ●</text>
  <!-- pin17/18 -->
  <text x="393" y="277" text-anchor="end" fill="#555577" font-size="9">3V3 17</text>
  <text x="468" y="277" fill="#555577" font-size="9">18  GP24</text>
  <!-- pin19/20 -->
  <text x="393" y="295" text-anchor="end" fill="#555577" font-size="9">MOSI19</text>
  <text x="468" y="295" fill="#555577" font-size="9">20  GND</text>
  <!-- ... -->
  <text x="455" y="320" text-anchor="middle" fill="#444466" font-size="9">· · ·</text>

  <!-- USB port label on Pi -->
  <rect x="365" y="460" width="80" height="22" rx="4" fill="#333355" stroke="#5555aa" stroke-width="1"/>
  <text x="405" y="475" text-anchor="middle" fill="#aaaacc" font-size="10">USB Port</text>
  <text x="405" y="492" text-anchor="middle" fill="#777799" font-size="9">to Tevo Board</text>

  <!-- Highlight dots on used pins -->
  <circle cx="395" cy="219" r="5" fill="#44aaff" opacity="0.9"/>
  <circle cx="395" cy="237" r="5" fill="#ffaa00" opacity="0.9"/>
  <circle cx="395" cy="255" r="5" fill="#00dd88" opacity="0.9"/>
  <circle cx="465" cy="255" r="5" fill="#cc44ff" opacity="0.9"/>
  <circle cx="465" cy="165" r="5" fill="#ff5555" opacity="0.9"/>

  <!-- ═══════════════════════════
       BUTTONS  (left side)
  ════════════════════════════ -->

  <!-- UP button -->
  <rect x="50" y="185" width="88" height="52" rx="10" fill="#0d2a40" stroke="#44aaff" stroke-width="2.5"/>
  <text x="94" y="207" text-anchor="middle" fill="#44aaff" font-size="22">▲</text>
  <text x="94" y="228" text-anchor="middle" fill="#88ccff" font-size="11" font-weight="bold">UP</text>
  <text x="65"  y="248" text-anchor="middle" fill="#44aaff" font-size="8">GPIO17</text>
  <text x="123" y="248" text-anchor="middle" fill="#ff5555" font-size="8">GND</text>
  <circle cx="65"  cy="237" r="4" fill="#44aaff"/>
  <circle cx="123" cy="237" r="4" fill="#ff5555"/>

  <!-- DOWN button -->
  <rect x="50" y="265" width="88" height="52" rx="10" fill="#2a1a00" stroke="#ffaa00" stroke-width="2.5"/>
  <text x="94" y="287" text-anchor="middle" fill="#ffaa00" font-size="22">▼</text>
  <text x="94" y="308" text-anchor="middle" fill="#ffcc88" font-size="11" font-weight="bold">DOWN</text>
  <text x="65"  y="328" text-anchor="middle" fill="#ffaa00" font-size="8">GPIO27</text>
  <text x="123" y="328" text-anchor="middle" fill="#ff5555" font-size="8">GND</text>
  <circle cx="65"  cy="317" r="4" fill="#ffaa00"/>
  <circle cx="123" cy="317" r="4" fill="#ff5555"/>

  <!-- LEFT button -->
  <rect x="50" y="345" width="88" height="52" rx="10" fill="#002a15" stroke="#00dd88" stroke-width="2.5"/>
  <text x="94" y="367" text-anchor="middle" fill="#00dd88" font-size="22">◀</text>
  <text x="94" y="388" text-anchor="middle" fill="#88ffcc" font-size="11" font-weight="bold">LEFT</text>
  <text x="65"  y="408" text-anchor="middle" fill="#00dd88" font-size="8">GPIO22</text>
  <text x="123" y="408" text-anchor="middle" fill="#ff5555" font-size="8">GND</text>
  <circle cx="65"  cy="397" r="4" fill="#00dd88"/>
  <circle cx="123" cy="397" r="4" fill="#ff5555"/>

  <!-- RIGHT button -->
  <rect x="50" y="425" width="88" height="52" rx="10" fill="#1e0a2e" stroke="#cc44ff" stroke-width="2.5"/>
  <text x="94" y="447" text-anchor="middle" fill="#cc44ff" font-size="22">▶</text>
  <text x="94" y="468" text-anchor="middle" fill="#dd99ff" font-size="11" font-weight="bold">RIGHT</text>
  <text x="65"  y="488" text-anchor="middle" fill="#cc44ff" font-size="8">GPIO23</text>
  <text x="123" y="488" text-anchor="middle" fill="#ff5555" font-size="8">GND</text>
  <circle cx="65"  cy="477" r="4" fill="#cc44ff"/>
  <circle cx="123" cy="477" r="4" fill="#ff5555"/>

  <!-- ═══════════════════════════
       WIRES — buttons to Pi
  ════════════════════════════ -->

  <!-- UP — blue -->
  <polyline points="65,237 30,237 30,219 355,219" fill="none" stroke="#44aaff" stroke-width="2" stroke-dasharray="7,3"/>
  <!-- DOWN — orange -->
  <polyline points="65,317 25,317 25,237 355,237" fill="none" stroke="#ffaa00" stroke-width="2" stroke-dasharray="7,3"/>
  <!-- LEFT — green -->
  <polyline points="65,397 20,397 20,255 355,255" fill="none" stroke="#00dd88" stroke-width="2" stroke-dasharray="7,3"/>
  <!-- RIGHT — purple (goes right then up to pin16) -->
  <polyline points="123,477 340,477 340,255 465,255" fill="none" stroke="#cc44ff" stroke-width="2" stroke-dasharray="7,3"/>

  <!-- GND shared rail from buttons to Pi pin6 -->
  <!-- GND from UP button -->
  <polyline points="123,237 155,237 155,165 465,165" fill="none" stroke="#ff5555" stroke-width="2"/>
  <!-- GND from DOWN -->
  <line x1="123" y1="317" x2="155" y2="317" stroke="#ff5555" stroke-width="1.5"/>
  <line x1="155" y1="237" x2="155" y2="477" stroke="#ff5555" stroke-width="1.5"/>
  <!-- GND from LEFT -->
  <line x1="123" y1="397" x2="155" y2="397" stroke="#ff5555" stroke-width="1.5"/>
  <!-- GND from RIGHT -->
  <line x1="123" y1="477" x2="155" y2="477" stroke="#ff5555" stroke-width="1.5"/>

  <!-- GND rail label -->
  <rect x="143" y="330" width="28" height="50" rx="4" fill="#2a0808" stroke="#ff5555" stroke-width="1"/>
  <text x="157" y="348" text-anchor="middle" fill="#ff5555" font-size="8" font-weight="bold">GND</text>
  <text x="157" y="360" text-anchor="middle" fill="#ff5555" font-size="8">RAIL</text>
  <text x="157" y="372" text-anchor="middle" fill="#cc3333" font-size="7">shared</text>

  <!-- ═══════════════════════════
       TEVO TARANTULA BOARD
  ════════════════════════════ -->
  <rect x="620" y="200" width="270" height="280" rx="12" fill="#1a1000" stroke="#cc8800" stroke-width="2"/>
  <text x="755" y="222" text-anchor="middle" fill="#ffcc66" font-size="13" font-weight="bold">Tevo Tarantula Board</text>
  <text x="755" y="238" text-anchor="middle" fill="#aa8844" font-size="10">MKS Base / RAMPS-style</text>

  <!-- USB-B port on board -->
  <rect x="630" y="248" width="55" height="30" rx="4" fill="#222233" stroke="#5555aa" stroke-width="1.5"/>
  <text x="657" y="263" text-anchor="middle" fill="#aaaacc" font-size="9" font-weight="bold">USB-B</text>
  <text x="657" y="274" text-anchor="middle" fill="#777799" font-size="8">from Pi</text>

  <!-- Y axis stepper driver slot -->
  <rect x="700" y="248" width="90" height="55" rx="6" fill="#0d1a0d" stroke="#44cc44" stroke-width="2"/>
  <text x="745" y="268" text-anchor="middle" fill="#44cc44" font-size="11" font-weight="bold">Y AXIS</text>
  <text x="745" y="282" text-anchor="middle" fill="#44cc44" font-size="10">DRIVER</text>
  <text x="745" y="296" text-anchor="middle" fill="#88aa88" font-size="8">stepper port</text>

  <!-- 12V power input -->
  <rect x="630" y="320" width="80" height="30" rx="4" fill="#2a0d00" stroke="#ff6600" stroke-width="1.5"/>
  <text x="670" y="334" text-anchor="middle" fill="#ff8833" font-size="9" font-weight="bold">12V PSU</text>
  <text x="670" y="346" text-anchor="middle" fill="#cc5500" font-size="8">power input</text>

  <!-- Vref trim pot callout -->
  <rect x="720" y="330" width="155" height="50" rx="6" fill="#1a1400" stroke="#886600" stroke-width="1"/>
  <text x="797" y="347" text-anchor="middle" fill="#ccaa00" font-size="10" font-weight="bold">⚠ Vref Trim Pot</text>
  <text x="797" y="361" text-anchor="middle" fill="#aa8800" font-size="9">Adjust for your motor's</text>
  <text x="797" y="373" text-anchor="middle" fill="#aa8800" font-size="9">rated current (A)</text>

  <!-- Board G-code label -->
  <rect x="630" y="400" width="245" height="65" rx="6" fill="#0a0a1a" stroke="#333366" stroke-width="1"/>
  <text x="752" y="417" text-anchor="middle" fill="#7777bb" font-size="10" font-weight="bold">G-code sent on each treat:</text>
  <text x="752" y="432" text-anchor="middle" fill="#aaaadd" font-size="9" font-family="monospace">G91  →  relative mode</text>
  <text x="752" y="446" text-anchor="middle" fill="#aaaadd" font-size="9" font-family="monospace">G1 Y30 F300  →  rotate ~90°</text>
  <text x="752" y="460" text-anchor="middle" fill="#aaaadd" font-size="9" font-family="monospace">G90 / M400  →  finish</text>

  <!-- ═══════════════════════════
       USB wire Pi → Tevo
  ════════════════════════════ -->
  <polyline points="445,471 445,540 607,540 607,263 620,263"
            fill="none" stroke="#5555ff" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="526" y="556" text-anchor="middle" fill="#7777ff" font-size="10" font-weight="bold">USB cable  (serial / G-code)</text>

  <!-- ═══════════════════════════
       STEPPER MOTOR
  ════════════════════════════ -->
  <rect x="640" y="570" width="110" height="70" rx="10" fill="#0d1a0d" stroke="#44cc44" stroke-width="2.5"/>
  <text x="695" y="595" text-anchor="middle" fill="#44cc44" font-size="13">⚙</text>
  <text x="695" y="612" text-anchor="middle" fill="#88ffaa" font-size="11" font-weight="bold">STEPPER</text>
  <text x="695" y="628" text-anchor="middle" fill="#66aa66" font-size="9">Treat Dispenser</text>

  <!-- stepper wire from Y axis port -->
  <polyline points="745,303 745,570" fill="none" stroke="#44cc44" stroke-width="2.5"/>
  <line x1="695" y1="570" x2="745" y2="570" stroke="#44cc44" stroke-width="2.5"/>
  <text x="760" y="460" fill="#44cc44" font-size="9" transform="rotate(-90,760,460)">stepper wires (4-pin)</text>

  <!-- ═══════════════════════════
       LEGEND
  ════════════════════════════ -->
  <rect x="620" y="75" width="270" height="112" rx="8" fill="#0e0e1e" stroke="#333355" stroke-width="1.5"/>
  <text x="755" y="95" text-anchor="middle" fill="#aaaacc" font-size="12" font-weight="bold">Wire Legend</text>

  <line x1="635" y1="112" x2="670" y2="112" stroke="#44aaff" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="678" y="116" fill="#44aaff" font-size="10">UP button → GPIO 17  (Pin 11)</text>

  <line x1="635" y1="128" x2="670" y2="128" stroke="#ffaa00" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="678" y="132" fill="#ffaa00" font-size="10">DOWN button → GPIO 27  (Pin 13)</text>

  <line x1="635" y1="144" x2="670" y2="144" stroke="#00dd88" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="678" y="148" fill="#00dd88" font-size="10">LEFT button → GPIO 22  (Pin 15)</text>

  <line x1="635" y1="160" x2="670" y2="160" stroke="#cc44ff" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="678" y="164" fill="#cc44ff" font-size="10">RIGHT button → GPIO 23  (Pin 16)</text>

  <line x1="635" y1="176" x2="670" y2="176" stroke="#ff5555" stroke-width="2.5"/>
  <text x="678" y="180" fill="#ff5555" font-size="10">GND shared rail → Pin 6</text>

  <line x1="635" y1="179" x2="670" y2="179" stroke="#5555ff" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- overdrawn above, just label -->

</svg>
